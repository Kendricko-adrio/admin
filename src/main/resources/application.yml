spring:
  application:
    name: admin

  # ── PostgreSQL ──────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/et
    username: okcir
    password: okcir
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ── Flyway ─────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # ── Redis ──────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

# ── Auth / JWT ───────────────────────────────────────
auth:
  is-ldap: false # true = LDAP simulation, false = username-only

jwt:
  secret: "YourBase64EncodedSecretKeyThatIsAtLeast256BitsLong!!"
  expiration: 3600 # seconds (1 hour)
